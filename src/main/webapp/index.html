<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting Dots Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Dots and Boxes</h1>
        <div class="scoreboard">
            <div class="player player-1 active">Player 1: <span id="p1-score">0</span></div>
            <div class="player player-2">Player 2: <span id="p2-score">0</span></div>
        </div>
        <div class="turn-indicator" id="turn-text">Player 1's Turn</div>
        <div class="board" id="board"></div>
        <button id="reset-btn">Restart Game</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
